services:
  - type: web
    name: ai-assistant-development
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User must specify their own key in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
